<!DOCTYPE html>
<html lang="en">
<head>

<body>

<header class="header">

<section class="scanner">

    <h2>AI Scam Scanner</h2>

    <p>Paste any suspicious text, email or website below.</p>

        id="scanInput"
        rows="8"
        placeholder="Paste text, email or website link here...">

    <br><br>

    <button id="scanBtn">Scan Now</button>

    <div id="result" class="result"></div>

</section>
