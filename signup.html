<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Create Account | TrustAI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">

<h1>Create Your TrustAI Account</h1>

<input id="name" class="scan-input" placeholder="Full Name">

<br><br>

<button onclick="signup()">
Create Account
</button>

<p style="margin-top:25px;">
Already have an account?

<a href="login.html">
Login
</a>

</p>

</section>

<script src="script.js"></script>

</body>
</html>
